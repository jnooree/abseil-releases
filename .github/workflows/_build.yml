name: Build abseil

on:
  workflow_call:
    inputs:
      ref:
        type: string
        required: true
    outputs:
      ref:
        value: ${{ inputs.ref }}
      build-ref:
        value: ${{ jobs.build.outputs.build-ref }}

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os_arch: manylinux_2_28_x86_64
            runs-on: ubuntu-latest
          - os_arch: macosx_universal2
            runs-on: macos-latest

    outputs:
      build-ref: ${{ steps.self-checkout.outputs.commit }}

    runs-on: ${{ matrix.runs-on }}

    env:
      OS_ARCH: ${{ matrix.os_arch }}

    steps:
      - id: self-checkout
        uses: actions/checkout@v7

      - uses: actions/checkout@v7
        with:
          repository: jnooree/abseil-cpp
          ref: ${{ inputs.ref }}
          path: abseil-cpp

      - run: |
          test_common_args=(
            --test-dir build
            -T test
            --output-on-failure
            -j
            --timeout 300
          )

          echo "test_common_args=${test_common_args[*]}" >>"$GITHUB_ENV"

      - if: ${{ matrix.runs-on == 'ubuntu-latest' }}
        run: |
          sudo docker run --rm -v "$PWD:$PWD" -w "$PWD" \
            "quay.io/pypa/${OS_ARCH}:latest" \
            ./scripts/build.sh "${OS_ARCH}"
          sudo chown -R "$USER" "$PWD"

          GTEST_FILTER="-$(IFS=:; echo "${excluded[*]}")" \
            ctest ${test_common_args}

      - if: ${{ matrix.runs-on == 'macos-latest' }}
        uses: lukka/get-cmake@latest
        with:
          # Universal binary at least from 3.19.7
          # Automatic ctest parallelism from 3.29
          cmakeVersion: "~3.29"

      - if: ${{ matrix.runs-on == 'macos-latest' }}
        uses: maxim-lobanov/setup-xcode@v1
        with:
          # XCode 15.4 fails to build abseil correctly
          xcode-version: latest-stable

      - if: ${{ matrix.runs-on == 'macos-latest' }}
        run: |
          ./scripts/build.sh "${OS_ARCH}"

          # Flaky on M1
          GTEST_FILTER='-CordzInfoStatisticsTest.ThreadSafety' \
            arch -arm64 ctest ${test_common_args}

          # Some AVX instruction cannot run on M1
          GTEST_FILTER='-*.AVXEquality/*' \
            arch -x86_64 ctest ${test_common_args}

      - uses: actions/upload-artifact@v7
        with:
          name: libabsl-shared-${{ matrix.os_arch }}
          path: libabsl-shared-*.tar.gz
